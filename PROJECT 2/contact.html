<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | PULSE FIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">PULSE <span style="color: var(--neon-green);">FIT</span></div>
        <div class="nav-link">
            <a href="index.html">Home</a>
            <a href="services.html">Classes & Pricing</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
        <a href="contact.html" class="cta-btn">Join Now</a>
    </nav>

    <section class="contact-section">
        <div class="contact-wrapper">
            
            <div class="contact-info">
                <h2>GET IN <span style="color: var(--neon-green);">TOUCH</span></h2>
                <p>Have questions about memberships, schedules, or personal training? Drop us a message or visit our facility.</p>
                
                <div class="info-item">
                    <strong>📍 LOCATION:</strong>
                    <p>123 Innovation Way, Tech District</p>
                </div>
                <div class="info-item">
                    <strong>⏰ HOURS:</strong>
                    <p>Open 24 Hours / 7 Days a Week</p>
                </div>
                <div class="info-item">
                    <strong>📞 PHONE:</strong>
                    <p>+92 111 5678932</p>
                </div>
            </div>

            <div class="contact-form-container">
                <form class="gym-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Select Your Plan</label>
                        <select>
                            <option>Basic Plan — $29/mo</option>
                            <option selected>Elite Plan — $49/mo</option>
                            <option>VIP Viper Plan — $89/mo</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn">Send Application</button>
                </form>
            </div>

        </div>
    </section>

</body>
</html>
